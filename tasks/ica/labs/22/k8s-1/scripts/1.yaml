# In-mesh namespace (sidecar injection enabled)
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    istio-injection: enabled
---
# "External" namespace (NO sidecar) — simulates a service outside the mesh
apiVersion: v1
kind: Namespace
metadata:
  name: external
---
# nginx config: serve ONLY HTTPS on 8443
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-tls-conf
  namespace: external
data:
  default.conf: |
    server {
        listen 8443 ssl;
        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        location / {
            default_type text/plain;
            return 200 "secure-ok\n";
        }
    }
---
# HTTPS-only backend (no sidecar) terminating its own TLS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpsvc
  namespace: external
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpsvc
  template:
    metadata:
      labels:
        app: httpsvc
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: tls
          mountPath: /etc/nginx/tls
          readOnly: true
      volumes:
      - name: conf
        configMap:
          name: nginx-tls-conf
      - name: tls
        secret:
          secretName: httpsvc-tls
---
# Service exposes the backend on plaintext port 80 -> TLS targetPort 8443
apiVersion: v1
kind: Service
metadata:
  name: httpsvc
  namespace: external
  labels:
    app: httpsvc
spec:
  ports:
  - port: 80
    name: http
    targetPort: 8443
  selector:
    app: httpsvc
---
# In-mesh client (has a sidecar)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-client
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-client
  template:
    metadata:
      labels:
        app: app-client
    spec:
      containers:
      - name: curl
        image: curlimages/curl:latest
        command: ["sleep", "infinity"]
