# Namespace with sidecar injection enabled
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    istio-injection: enabled
---
# Service for version v1 (stable)
apiVersion: v1
kind: Service
metadata:
  name: ping-pong-v1
  namespace: app
  labels:
    app: ping-pong
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: ping-pong
    version: v1
---
# Service for version v2 (canary)
apiVersion: v1
kind: Service
metadata:
  name: ping-pong-v2
  namespace: app
  labels:
    app: ping-pong
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: ping-pong
    version: v2
---
# Deployment v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-v1
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
      version: v1
  template:
    metadata:
      labels:
        app: ping-pong
        version: v1
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Ping-Pong-V1 (Stable)"
---
# Deployment v2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-v2
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
      version: v2
  template:
    metadata:
      labels:
        app: ping-pong
        version: v2
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Ping-Pong-V2 (Canary)"
