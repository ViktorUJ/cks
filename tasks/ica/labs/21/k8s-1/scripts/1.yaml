# Namespace app (sidecar injection enabled)
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    istio-injection: enabled
---
# Namespace other (sidecar injection enabled) — a "far away" namespace
apiVersion: v1
kind: Namespace
metadata:
  name: other
  labels:
    istio-injection: enabled
---
# App service (namespace app)
apiVersion: v1
kind: Service
metadata:
  name: ping-pong
  namespace: app
  labels:
    app: ping-pong
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: ping-pong
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Ping-Pong (app)"
---
# Backend service in the "other" namespace
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: other
  labels:
    app: backend
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: other
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Backend (other)"
