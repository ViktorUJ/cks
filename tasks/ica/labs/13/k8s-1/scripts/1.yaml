# ============================================================================
# ICA Lab 13 — Securing Edge Traffic with TLS
# ----------------------------------------------------------------------------
#   - ping-pong : backend exposed to the outside world over HTTPS via the
#                 ingress gateway (TLS is terminated at the edge).
# Namespace: default (istio-injection=enabled).
# ============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: ping-pong
  namespace: default
  labels:
    app: ping-pong
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: ping-pong
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Ping-Pong Backend"
