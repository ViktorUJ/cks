# ============================================================================
# ICA Lab 10 — Resilience: Timeout + Circuit Breaker
# ----------------------------------------------------------------------------
# Workloads (namespace default, istio-injection=enabled):
#   - slow       : ping_pong with RESPONSE_DELAY=5000ms -> a genuinely slow
#                  backend, used to demonstrate request timeouts (504).
#   - backend    : a fast ping_pong, used to demonstrate circuit breaking.
#   - curl-client: client to verify the timeout (504).
#   - fortio     : load generator to trip the circuit breaker (connection pool).
# ============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: slow
  namespace: default
  labels:
    app: slow
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: slow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow
  template:
    metadata:
      labels:
        app: slow
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Slow-Backend"
        - name: RESPONSE_DELAY   # every response is delayed by 5000 ms
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Backend"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-client
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-client
  template:
    metadata:
      labels:
        app: curl-client
    spec:
      containers:
      - name: curl
        image: curlimages/curl:latest
        command: ["sleep", "3650d"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortio
  template:
    metadata:
      labels:
        app: fortio
    spec:
      containers:
      - name: fortio
        image: fortio/fortio:latest
        ports:
        - containerPort: 8080
