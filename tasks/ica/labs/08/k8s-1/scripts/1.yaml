# ============================================================================
# ICA Lab 08 — Observability: Prometheus / Jaeger / Kiali
# ----------------------------------------------------------------------------
# A small two-tier app that generates real telemetry (metrics + traces):
#   frontend  -> calls -> ping-pong
# Plus a curl client used to query the Prometheus HTTP API from inside the mesh.
# Namespace: default (istio-injection=enabled).
# ============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: ping-pong
  namespace: default
  labels:
    app: ping-pong
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: ping-pong
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      containers:
      - name: ping-pong
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_NAME
          value: "Ping-Pong Backend"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 8080
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: viktoruj/ping_pong_front:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: BACKEND_URL
          value: "http://ping-pong:8080/"
---
# Client with a sidecar, used to query the Prometheus HTTP API from the mesh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-client
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-client
  template:
    metadata:
      labels:
        app: curl-client
    spec:
      containers:
      - name: curl
        image: curlimages/curl:latest
        command: ["sleep", "3650d"]
