# Namespace with sidecar injection enabled
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: app
  labels: {app: frontend}
spec:
  ports: [{name: http, port: 8080, targetPort: 8080}]
  selector: {app: frontend}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: frontend, namespace: app}
spec:
  replicas: 1
  selector: {matchLabels: {app: frontend}}
  template:
    metadata: {labels: {app: frontend}}
    spec:
      containers:
      - name: app
        image: viktoruj/ping_pong:latest
        imagePullPolicy: Always
        ports: [{containerPort: 8080}]
        env: [{name: SERVER_NAME, value: "frontend"}]
---
